name: CMake on multiple platforms

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'CMakeLists.txt'
      - '**/*.cmake'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.py'
      - 'ThirdParty/**'
      - '.github/workflows/cmake-multi-platform.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'CMakeLists.txt'
      - '**/*.cmake'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.py'
      - 'ThirdParty/**'
      - '.github/workflows/cmake-multi-platform.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # --- ccache (Linux only) ---
    - name: Install ccache
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y ccache

    - name: Prepare ccache
      if: runner.os == 'Linux'
      id: ccache-prepare
      shell: bash
      run: |
        CCACHE_DIR="${{ runner.temp }}/ccache"
        echo "dir=${CCACHE_DIR}" >> "$GITHUB_OUTPUT"
        mkdir -p "${CCACHE_DIR}"

    - name: Cache ccache
      if: runner.os == 'Linux'
      uses: actions/cache@v4
      with:
        path: ${{ steps.ccache-prepare.outputs.dir }}
        key: ccache-linux-${{ matrix.build_type }}-${{ github.sha }}
        restore-keys: |
          ccache-linux-${{ matrix.build_type }}-

    - name: Configure ccache
      if: runner.os == 'Linux'
      run: |
        ccache --set-config=max_size=500M
        ccache --set-config=compression=true
        ccache -z

    # --- CMake build cache ---
    - name: Hash CMake and source files
      id: cmake-hash
      shell: bash
      run: |
        HASH=$(find . -name 'CMakeLists.txt' -o -name '*.cmake' \
                | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
        SUB_HASH=$(find ThirdParty -type f 2>/dev/null \
                   | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
        echo "hash=${HASH}-${SUB_HASH}" >> "$GITHUB_OUTPUT"

    - name: Cache CMake build directory
      uses: actions/cache@v4
      with:
        path: ${{ steps.strings.outputs.build-output-dir }}
        key: cmake-${{ runner.os }}-${{ matrix.build_type }}-${{ steps.cmake-hash.outputs.hash }}
        restore-keys: |
          cmake-${{ runner.os }}-${{ matrix.build_type }}-

    # --- pip cache ---
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/AppData/Local/pip/cache
        key: pip-${{ runner.os }}-${{ hashFiles('PySparQ/**/setup.py', 'PySparQ/**/pyproject.toml', 'setup.py', 'pyproject.toml') }}
        restore-keys: |
          pip-${{ runner.os }}-

    # --- Build ---
    - name: Configure CMake
      shell: bash
      env:
        CC: ${{ runner.os == 'Linux' && 'ccache gcc' || matrix.c_compiler }}
        CXX: ${{ runner.os == 'Linux' && 'ccache g++' || matrix.cpp_compiler }}
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ runner.os == 'Linux' && 'g++' || matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ runner.os == 'Linux' && 'gcc' || matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCACHED_REGISTER_SIZE=50
        -S .

    - name: Build
      shell: bash
      env:
        CC: ${{ runner.os == 'Linux' && 'ccache gcc' || matrix.c_compiler }}
        CXX: ${{ runner.os == 'Linux' && 'ccache g++' || matrix.cpp_compiler }}
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }}
        --config ${{ matrix.build_type }}
        --parallel 4

    - name: Show ccache stats
      if: runner.os == 'Linux'
      run: ccache -s

    # --- Test ---
    - name: Test
      # Use ctest to run all registered tests (via gtest_discover_tests)
      # This works on both Linux and Windows via CTest's platform detection
      if: ${{ matrix.os == 'ubuntu-latest' }}
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
          ctest --output-on-failure

    - name: Test
      # Windows uses multi-config generators, specify --configuration
      if: ${{ matrix.os == 'windows-latest' }}
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
          ctest --output-on-failure -C ${{ matrix.build_type }}
                                
    # --- Python package ---
    - name: Build Python Package
      run: pip install .

    - name: Test Python Package
      run: python -c "import pysparq; pysparq.test_import()"
