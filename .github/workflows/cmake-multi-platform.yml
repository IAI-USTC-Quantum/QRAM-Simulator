# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations.
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCACHED_REGISTER_SIZE=50
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }}
        --config ${{ matrix.build_type }}
        --parallel 4
        # --target 
        # ExecutabilityTest 
        # CorrectnessTest 
        
    - name: Test
      # Test on Linux will not have extenions.
      if: ${{ matrix.os == 'Linux' }}
      run: |
          ${{ steps.strings.outputs.build-output-dir }}/bin/ExecutabilityTest          
          ${{ steps.strings.outputs.build-output-dir }}/bin/CorrectnessTest       
          ${{ steps.strings.outputs.build-output-dir }}/bin/CudaExecutabilityTest

    - name: Test
      # Test on Windows will have a ".exe" extension, while Linux executables will have no extension.
      # Treat them differently to avoid errors.
      if: ${{ matrix.os == 'Windows' }}
      run: |
          ${{ steps.strings.outputs.build-output-dir }}/bin/ExecutabilityTest.exe
          ${{ steps.strings.outputs.build-output-dir }}/bin/CorrectnessTest.exe
          ${{ steps.strings.outputs.build-output-dir }}/bin/CudaExecutabilityTest.exe
                                
    - name: Build Python Package
      if: ${{ matrix.os == 'Linux' }}
      # Build your program with the given configuration
      run: pip install .
              
    - name: Build Python Package
      if: ${{ matrix.os == 'Windows' }}
      # Build your program with the given configuration
      run: pip install .

    - name: Test Python Package
      run: python -c "import pysparq; pysparq.test_import()"
