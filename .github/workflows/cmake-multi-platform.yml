name: CMake on multiple platforms

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Main build job
  # ============================================================================
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux + GCC + C++17
          - name: "Ubuntu + GCC + C++17"
            os: ubuntu-24.04
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
            cpp_standard: 17
          # Linux + GCC + C++20
          - name: "Ubuntu + GCC + C++20"
            os: ubuntu-24.04
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
            cpp_standard: 20
          # Windows + MSVC
          - name: "Windows + MSVC"
            os: windows-latest
            build_type: Release
            c_compiler: cl
            cpp_compiler: cl
            cpp_standard: 17

    env:
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'true'

    # --- ccache (Linux only) ---
    - name: Install ccache
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y ccache

    - name: Configure ccache
      if: runner.os == 'Linux'
      run: |
        ccache --set-config=max_size=2G
        ccache --set-config=compression=true
        ccache -z

    - name: Cache ccache
      if: runner.os == 'Linux'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-${{ matrix.cpp_compiler }}-${{ matrix.cpp_standard }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ matrix.cpp_compiler }}-${{ matrix.cpp_standard }}-

    # --- sccache (Windows only) ---
    - name: Install sccache
      if: runner.os == 'Windows'
      run: |
        $sccacheVersion = "0.9.1"
        $url = "https://github.com/mozilla/sccache/releases/download/v${sccacheVersion}/sccache-v${sccacheVersion}-x86_64-pc-windows-msvc.zip"
        Invoke-WebRequest -Uri $url -OutFile sccache.zip
        Expand-Archive -Path sccache.zip -DestinationPath sccache
        echo "$env:GITHUB_WORKSPACE\sccache\sccache-v${sccacheVersion}-x86_64-pc-windows-msvc" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Cache sccache
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: ~/.cache/sccache
        key: sccache-${{ runner.os }}-msvc-${{ matrix.cpp_standard }}-${{ github.sha }}
        restore-keys: |
          sccache-${{ runner.os }}-msvc-${{ matrix.cpp_standard }}-

    # --- CMake configure ---
    - name: Configure CMake
      shell: bash
      run: |
        EXTRA_ARGS=""
        if [ "$RUNNER_OS" = "Linux" ]; then
          EXTRA_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
        elif [ "$RUNNER_OS" = "Windows" ]; then
          EXTRA_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=sccache"
        fi
        cmake -B "$BUILD_DIR" \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_CXX_STANDARD=${{ matrix.cpp_standard }} \
          -DCACHED_REGISTER_SIZE=50 \
          $EXTRA_ARGS \
          -S .

    # --- Build ---
    - name: Build
      shell: bash
      run: cmake --build "$BUILD_DIR" --config ${{ matrix.build_type }} --parallel 4

    - name: Show ccache stats
      if: runner.os == 'Linux'
      run: ccache -s

    - name: Show sccache stats
      if: runner.os == 'Windows'
      run: sccache --show-stats

    # --- Test ---
    - name: Test (Unix)
      if: runner.os != 'Windows'
      working-directory: ${{ env.BUILD_DIR }}
      env:
        PROJECT_ROOT: ${{ github.workspace }}
      run: ctest --output-on-failure -j4

    - name: Test (Windows)
      if: runner.os == 'Windows'
      working-directory: ${{ env.BUILD_DIR }}
      env:
        PROJECT_ROOT: ${{ github.workspace }}
      run: ctest --output-on-failure -C ${{ matrix.build_type }} -j4

    # --- Python package ---
    - name: Build Python Package
      run: pip install .

    - name: Test Python Package
      run: python -c "import pysparq; pysparq.test_import()"

    - name: Validate Stubs in Wheel
      if: runner.os == 'Linux' && matrix.cpp_standard == '17'
      run: |
        # stubs are auto-generated by cibuildwheel hooks; verify they are present
        python -c "
        import sys, os, zipfile, tempfile, shutil
        import pysparq
        pkg_dir = os.path.dirname(pysparq.__file__)
        stub_path = os.path.join(pkg_dir, '_core.pyi')
        if not os.path.exists(stub_path):
            print('ERROR: _core.pyi not found in installed package at', pkg_dir)
            sys.exit(1)
        size = os.path.getsize(stub_path)
        print(f'_core.pyi found ({size} bytes)')
        if size < 100:
            print('ERROR: stub file suspiciously small')
            sys.exit(1)
        print('Stub validation passed')
        "

  # ============================================================================
  # Python tests with multiple versions
  # ============================================================================
  python-tests:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        python-version: ['3.10', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy

    - name: Build and install package
      run: pip install -v .

    - name: Run import test
      run: python -c "import pysparq; pysparq.test_import()"

    - name: Run pytest
      shell: bash
      run: |
        if [ -d "PySparQ/test" ]; then
          pytest PySparQ/test/ -v || true
        else
          echo "No Python tests found"
        fi

  # ============================================================================
  # Documentation build job
  # ============================================================================
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - id: setup-python
      name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Documentation Dependencies
      run: |
        "${{ env.pythonLocation }}/bin/python" -m pip install -r docs/sphinx/requirements.txt
        sudo apt-get update && sudo apt-get install -y doxygen graphviz pandoc libgomp1

    - name: Install pysparq for notebook execution
      run: |
        "${{ env.pythonLocation }}/bin/python" -m pip install --no-cache-dir .

    - name: Generate Doxygen Documentation
      run: doxygen Doxyfile

    - name: Build Sphinx Documentation
      run: |
        cd docs/sphinx
        make html

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: |
          docs/api/html/
          docs/sphinx/build/html/
        retention-days: 30

    - name: Prepare Pages directory
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p pages-deploy

        # Landing page
        cp docs/index.html pages-deploy/index.html

        # Sphinx docs (Python API)
        mkdir -p pages-deploy/python
        cp -r docs/sphinx/build/html/* pages-deploy/python/

        # Doxygen docs (C++ API)
        mkdir -p pages-deploy/api
        cp -r docs/api/html/* pages-deploy/api/

        # Other docs
        cp docs/architecture.md pages-deploy/
        cp docs/operators.md pages-deploy/
        cp docs/README.md pages-deploy/

    - name: Deploy to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: pages-deploy/
        publish_branch: gh-pages
